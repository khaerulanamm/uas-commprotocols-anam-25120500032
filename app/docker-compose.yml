services:
  creditcore-api:
    build: .
    image: creditcore/mock-api:latest
    container_name: creditcore-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Overridable — falls back to .env, then to sane defaults.
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8080}
      API_PROTOCOL: ${API_PROTOCOL:-http}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8080}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    ports:
      # Host port : container port — always 8080 inside the container.
      - "${API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/health"]
      interval: 15s
      timeout: 3s
      retries: 5
